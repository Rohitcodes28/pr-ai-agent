<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnicornXMedia Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans">

    <!-- Login Screen -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full border border-gray-100 transform transition-all">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-black text-white rounded-2xl flex items-center justify-center font-bold text-3xl tracking-tighter mx-auto mb-4">UX</div>
                <h1 class="text-2xl font-bold text-gray-900">Admin Login</h1>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-black">
                </div>
                <p id="loginError" class="text-red-500 text-sm hidden"></p>
                <button onclick="login()" id="loginBtn" class="w-full bg-black text-white font-bold py-3 rounded-xl hover:bg-gray-800 transition mt-4">
                    Login
                </button>
            </div>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboardScreen" class="hidden min-h-screen flex flex-col">
        <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-black text-white rounded-lg flex items-center justify-center font-bold tracking-tighter">UX</div>
                        <span class="font-bold">Control Panel</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-gray-500 text-sm">Logged in as <strong class="text-black">admin</strong></span>
                        <button onclick="logout()" class="text-red-600 hover:text-red-800 text-sm font-semibold transition">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex-grow grid grid-cols-1 md:grid-cols-4 gap-8">
            <!-- Sidebar -->
            <div class="md:col-span-1 space-y-2">
                <button onclick="switchTab('liveEvent')" id="tab-liveEvent" class="w-full text-left px-4 py-3 rounded-lg font-bold bg-black text-white transition">
                    <i class="fa-solid fa-play-circle w-6"></i> Live Event Section
                </button>
                <button onclick="switchTab('archives')" id="tab-archives" class="w-full text-left px-4 py-3 rounded-lg font-bold bg-white text-gray-600 hover:bg-gray-100 transition">
                    <i class="fa-solid fa-images w-6"></i> Archives Data
                </button>
            </div>

            <!-- Main Content -->
            <div class="md:col-span-3">
                <!-- Live Event Tab -->
                <div id="content-liveEvent" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                    <h2 class="text-2xl font-bold mb-6">Edit Live Event Section</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Badge Text</label>
                            <input type="text" id="le-badge" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Main Title</label>
                            <input type="text" id="le-title" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Description</label>
                            <textarea id="le-desc" rows="4" class="w-full border border-gray-300 rounded-lg px-4 py-2"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Button Text</label>
                            <input type="text" id="le-btn" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Video File Path (e.g. Videos/event.mp4)</label>
                                <input type="text" id="le-video" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Video Poster Image Path</label>
                                <input type="text" id="le-poster" class="w-full border border-gray-300 rounded-lg px-4 py-2">
                            </div>
                        </div>
                    </div>
                    <div class="mt-8 flex justify-end">
                        <button onclick="saveLiveEvent()" id="btnSaveLiveEvent" class="bg-green-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-green-700 transition">Save Changes</button>
                    </div>
                </div>

                <!-- Archives Tab -->
                <div id="content-archives" class="hidden space-y-6">
                    <!-- Current Events -->
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                        <h2 class="text-2xl font-bold mb-6">Current Archive Events</h2>
                        <div id="eventsList" class="space-y-3">
                            <!-- Populated dynamically -->
                        </div>
                    </div>

                    <!-- Add New -->
                    <div class="bg-gray-900 rounded-2xl shadow-sm p-6 text-white">
                        <h2 class="text-xl font-bold mb-6">Add New Event</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-1">Title</label>
                                <input type="text" id="ev-title" class="w-full bg-gray-800 border bg-transparent border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-gray-500">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-400 mb-1">Year</label>
                                    <input type="text" id="ev-year" placeholder="2026" class="w-full bg-gray-800 border bg-transparent border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-gray-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-semibold text-gray-400 mb-1">Date</label>
                                    <input type="text" id="ev-date" placeholder="March 25" class="w-full bg-gray-800 border bg-transparent border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-gray-500">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-1">Location</label>
                                <input type="text" id="ev-location" class="w-full bg-gray-800 border bg-transparent border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-gray-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-1">Short Highlight</label>
                                <input type="text" id="ev-highlight" placeholder="14 Guests" class="w-full bg-gray-800 border bg-transparent border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-gray-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-1">Statistic</label>
                                <input type="text" id="ev-stat" placeholder="500+ Attendees" class="w-full bg-gray-800 border bg-transparent border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-gray-500">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-400 mb-1">Icon Theme</label>
                                <select id="ev-icon" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-gray-500">
                                    <option value="fa-users">Users</option>
                                    <option value="fa-star">Star</option>
                                    <option value="fa-camera">Camera</option>
                                    <option value="fa-bullhorn">Megaphone</option>
                                    <option value="fa-trophy">Trophy</option>
                                    <option value="fa-handshake">Handshake</option>
                                </select>
                            </div>
                            <div class="col-span-2">
                                <label class="block text-sm font-semibold text-gray-400 mb-1">Photo Files (Comma separated. Upload to Photos/ via cPanel first)</label>
                                <textarea id="ev-images" rows="2" placeholder="Events-1.jpg, IMG_5250.jpg" class="w-full bg-gray-800 border bg-transparent border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-gray-500"></textarea>
                            </div>
                        </div>
                        <div class="mt-6 flex justify-end">
                            <button onclick="addEvent()" class="bg-white text-black font-bold py-2 px-6 rounded-lg hover:bg-gray-200 transition"><i class="fa-solid fa-plus"></i> Add Event</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 bg-gray-900 text-white px-6 py-3 rounded-xl shadow-2xl transition-all translate-y-20 opacity-0 z-50 flex items-center gap-3 font-semibold">
        <i class="fa-solid fa-circle-check text-green-400"></i> <span id="toastMsg">Saved successfully!</span>
    </div>

    <script>
        let liveEventData = {};
        let archivesData = [];

        // Check login on load
        window.onload = async () => {
            const res = await fetch('api/verify-login.php');
            const data = await res.json();
            if (data.loggedIn) {
                showDashboard();
            }
        };

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = 'Logging in...';
            btn.disabled = true;

            const res = await fetch('api/login.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: p})
            });
            const data = await res.json();
            
            if (data.success) {
                showDashboard();
            } else {
                document.getElementById('loginError').textContent = data.message;
                document.getElementById('loginError').classList.remove('hidden');
            }
            btn.innerHTML = 'Login';
            btn.disabled = false;
        }

        async function logout() {
            await fetch('api/logout.php');
            document.getElementById('dashboardScreen').classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        function showDashboard() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('dashboardScreen').classList.remove('hidden');
            fetchData();
        }

        function switchTab(tab) {
            document.getElementById('tab-liveEvent').className = 'w-full text-left px-4 py-3 rounded-lg font-bold bg-white text-gray-600 hover:bg-gray-100 transition';
            document.getElementById('tab-archives').className = 'w-full text-left px-4 py-3 rounded-lg font-bold bg-white text-gray-600 hover:bg-gray-100 transition';
            
            document.getElementById('content-liveEvent').classList.add('hidden');
            document.getElementById('content-archives').classList.add('hidden');

            document.getElementById('tab-' + tab).className = 'w-full text-left px-4 py-3 rounded-lg font-bold bg-black text-white transition';
            document.getElementById('content-' + tab).classList.remove('hidden');
        }

        async function fetchData() {
            // Live Event
            const res1 = await fetch('api/get_data.php?type=live_event');
            liveEventData = await res1.json();
            document.getElementById('le-badge').value = liveEventData.badge_text || '';
            document.getElementById('le-title').value = liveEventData.title_main || '';
            document.getElementById('le-desc').value = liveEventData.description || '';
            document.getElementById('le-btn').value = liveEventData.button_text || '';
            document.getElementById('le-video').value = liveEventData.video_url || '';
            document.getElementById('le-poster').value = liveEventData.video_poster || '';

            // Archives
            const res2 = await fetch('api/get_data.php?type=events');
            archivesData = await res2.json();
            renderArchivesList();
        }

        async function saveLiveEvent() {
            liveEventData = {
                badge_text: document.getElementById('le-badge').value,
                title_main: document.getElementById('le-title').value,
                description: document.getElementById('le-desc').value,
                button_text: document.getElementById('le-btn').value,
                video_url: document.getElementById('le-video').value,
                video_poster: document.getElementById('le-poster').value
            };
            
            const btn = document.getElementById('btnSaveLiveEvent');
            btn.innerHTML = 'Saving...';
            
            const res = await fetch('api/save_data.php?type=live_event', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(liveEventData)
            });
            const data = await res.json();
            
            btn.innerHTML = 'Save Changes';
            if(data.success) showToast('Live event updated!');
            else alert(data.message);
        }

        function renderArchivesList() {
            const list = document.getElementById('eventsList');
            if (!archivesData || archivesData.length === 0) {
                list.innerHTML = '<p class="text-gray-500">No events found.</p>';
                return;
            }

            list.innerHTML = archivesData.map((ev, idx) => `
                <div class="flex items-center justify-between p-4 bg-gray-50 border border-gray-200 rounded-xl">
                    <div>
                        <span class="text-xs font-bold text-gray-500">${ev.year}</span>
                        <h4 class="font-bold text-lg">${ev.title}</h4>
                        <p class="text-xs text-gray-500">${ev.images.length} photos</p>
                    </div>
                    <button onclick="deleteEvent(${idx})" class="text-red-500 hover:text-red-700 p-2"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        async function saveArchives() {
            const res = await fetch('api/save_data.php?type=events', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(archivesData)
            });
            const data = await res.json();
            if(data.success) showToast('Archives updated!');
            else alert(data.message);
        }

        async function deleteEvent(index) {
            if(confirm('Are you sure you want to delete this event?')) {
                archivesData.splice(index, 1);
                renderArchivesList();
                await saveArchives();
            }
        }

        async function addEvent() {
            const title = document.getElementById('ev-title').value;
            if(!title) { alert('Title required'); return; }

            const rawImages = document.getElementById('ev-images').value;
            const images = rawImages.split(',').map(s=>s.trim()).filter(s=>s).map(img => `Photos/${img}`);

            const newEvent = {
                id: 'event-' + document.getElementById('ev-year').value + '-' + Date.now(),
                year: document.getElementById('ev-year').value || '2026',
                date: document.getElementById('ev-date').value || '',
                title: title,
                location: document.getElementById('ev-location').value || '',
                highlight: document.getElementById('ev-highlight').value || '',
                icon: document.getElementById('ev-icon').value || 'fa-users',
                stat: document.getElementById('ev-stat').value || '',
                images: images
            };

            archivesData.unshift(newEvent); // Add to top
            
            // clear inputs
            document.querySelectorAll('#content-archives input[type="text"]').forEach(i => i.value='');
            document.getElementById('ev-images').value='';

            renderArchivesList();
            await saveArchives();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            t.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                t.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
