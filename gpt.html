<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative PR Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #0a0a0a;
  color: white;
}

/* HERO */
.hero {
  height: 100vh;
  position: relative;
  overflow: hidden;
}

.hero video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-content {
  position: relative;
  z-index: 2;
  text-align: center;
  top: 50%;
  transform: translateY(-50%);
}

.hero h1 {
  font-size: 4rem;
  font-weight: 700;
}

.hero p {
  margin-top: 10px;
  font-size: 1.2rem;
  opacity: 0.8;
}

/* NUMBERS */
.stats {
  display: flex;
  justify-content: space-around;
  padding: 80px 20px;
  background: #111;
}

.stat {
  text-align: center;
}

.stat h2 {
  font-size: 3rem;
  color: #ff2e88;
}

/* SERVICES */
.services {
  padding: 80px 20px;
  text-align: center;
}

.service-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 30px;
  margin-top: 40px;
}

.service-card {
  background: #1a1a1a;
  padding: 40px;
  border-radius: 20px;
  transition: 0.4s;
}

.service-card:hover {
  transform: translateY(-10px);
  background: #ff2e88;
}

/* EVENTS */
.events {
  padding: 80px 20px;
}

.event-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

.event-card {
  position: relative;
  overflow: hidden;
  border-radius: 20px;
}

.event-card img {
  width: 100%;
  height: 100%;
  transition: 0.4s;
}

.event-card:hover img {
  transform: scale(1.1);
}

.event-title {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-weight: bold;
}

/* PODCAST */
.podcast {
  padding: 80px 20px;
  text-align: center;
}

/* FOOTER */
footer {
  padding: 40px;
  text-align: center;
  background: #111;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <video autoplay muted loop>
    <source src="your-video.mp4" type="video/mp4">
  </video>
  <div class="hero-content">
    <h1>Creative PR Redefined</h1>
    <p>PR • Events • Podcasts • Media</p>
  </div>
</section>

<!-- STATS -->
<section class="stats">
  <div class="stat">
    <h2>100+</h2>
    <p>Campaigns</p>
  </div>
  <div class="stat">
    <h2>50M</h2>
    <p>Reach</p>
  </div>
  <div class="stat">
    <h2>200+</h2>
    <p>Events</p>
  </div>
</section>

<!-- SERVICES -->
<section class="services">
  <h1>Our Services</h1>
  <div class="service-grid">
    <div class="service-card">Public Relations</div>
    <div class="service-card">Events</div>
    <div class="service-card">Podcasts</div>
    <div class="service-card">Media Features</div>
  </div>
</section>

<!-- EVENTS -->
<section class="events">
  <h1>Featured Events</h1>
  <div class="event-grid">
    <div class="event-card">
      <img src="event1.jpg">
      <div class="event-title">Pinkvilla Awards</div>
    </div>
    <div class="event-card">
      <img src="event2.jpg">
      <div class="event-title">Celebrity Launch</div>
    </div>
  </div>
</section>

<!-- PODCAST -->
<section class="podcast">
  <h1>Podcasts</h1>
  <p>Watch our latest conversations</p>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Creative Agency</p>
</footer>

</body>
</html>
